name: Bug Report
description: Report a bug in wx-cli
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: wx-cli version
      description: Output of `wx-cli --version`
      placeholder: "wx-cli 0.7.2 (96ccbbd 2026-06-04)"
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "macOS 15.5 (Apple Silicon)"
    validations:
      required: true
  - type: input
    id: wechat-version
    attributes:
      label: WeChat version
      placeholder: "4.1.8.29"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The commands you ran and their output.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
